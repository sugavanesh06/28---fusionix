<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerMate - Get Started</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8faff; }
        
        .step-container { transition: transform 0.5s ease-in-out; }
        .hidden-step { display: none; }
        
        .goal-btn.active {
            border-color: #6366f1;
            background-color: #f5f3ff;
            color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="text-center mb-8">
        <div class="bg-indigo-600 w-12 h-12 rounded-xl flex items-center justify-center text-white font-bold mx-auto mb-4 shadow-lg">CM</div>
        <h1 class="text-3xl font-bold text-slate-800">CareerMate</h1>
        <p class="text-slate-500">Your AI-powered career journey starts here</p>
    </div>

    <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl w-full max-w-2xl border border-slate-100">
        
        <div id="step1">
            <h2 class="text-xl font-bold text-slate-800 mb-6">Step 1: Create Account</h2>
            <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-slate-600 mb-1">Full Name</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-3 w-5 h-5 text-slate-400"></i>
                        <input type="text" placeholder="John Doe" class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-3 w-5 h-5 text-slate-400"></i>
                        <input type="email" placeholder="you@example.com" class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>

                    
                </div>

                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Enter OTP
                    </label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-3 w-5 h-5 text-slate-400"></i>
                        <input type="number" placeholder="Enter OTP " class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>

                    
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-3 w-5 h-5 text-slate-400"></i>
                        <input type="password" placeholder="••••••••" class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>
                <button type="button" onclick="goToStep2()" class="md:col-span-2 w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 rounded-xl shadow-lg hover:opacity-90 mt-4 transition-all flex items-center justify-center gap-2">
                    Next: Upload Resume <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>
            <p class="text-center text-sm text-slate-500 mt-6">Already have an account? <a href="#" class="text-indigo-600 font-bold">Sign in</a></p>
        </div>

        <div id="step2" class="hidden-step">
            <button onclick="goToStep1()" class="text-indigo-600 text-sm font-bold flex items-center gap-1 mb-4 hover:underline">
                <i data-lucide="chevron-left" class="w-4 h-4"></i> Back to Sign Up
            </button>
            <h2 class="text-xl font-bold text-slate-800 mb-2">Step 2: Resume & Goal</h2>
            <p class="text-sm text-slate-500 mb-6">Tell us your goal and upload your resume for analysis.</p>

            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-8">
                
                <input type="text" placeholder="Enter your Goal" >
            </div>

            <div id="dropZone" class="border-2 border-dashed border-indigo-100 rounded-2xl p-10 bg-indigo-50/30 flex flex-col items-center cursor-pointer hover:bg-indigo-50 transition">
                <i data-lucide="upload-cloud" class="w-10 h-10 text-indigo-400 mb-3"></i>
                <p class="font-bold text-slate-700 text-sm" id="fileName">Upload your resume</p>
                <p class="text-[10px] text-slate-400 mt-1">PDF or DOCX (Max 10MB)</p>
                <input type="file" id="fileInput" class="hidden" accept=".pdf,.docx">
            </div>

            <button onclick="window.location.href='index.html'" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 rounded-xl shadow-lg hover:opacity-90 mt-8 transition-all">
                Back to Login
            </button>
        </div>

    </div>

    <script>
        lucide.createIcons();

        function goToStep2() {
            document.getElementById('step1').classList.add('hidden-step');
            document.getElementById('step2').classList.remove('hidden-step');
            lucide.createIcons();
        }

        function goToStep1() {
            document.getElementById('step2').classList.add('hidden-step');
            document.getElementById('step1').classList.remove('hidden-step');
        }

        function toggleGoal(btn) {
            document.querySelectorAll('.goal-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // File Selection logic
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileName.innerText = fileInput.files[0].name;
                fileName.classList.add('text-indigo-600');
            }
        });

        function finishSetup() {
            alert("Account created and Resume uploaded! Redirecting to Dashboard...");
            // window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
